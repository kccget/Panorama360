name: 自动打包Panorama360 APK
on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # 允许手动点击打包

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: 给Gradle执行权限
        run: chmod +x gradlew

      - name: 执行打包
        run: ./gradlew assembleDebug

      - name: 上传打包好的APK
        uses: actions/upload-artifact@v4
        with:
          name: Panorama360-APK安装包
          path: app/build/outputs/apk/debug/*.apk
