name: Panorama360 一键打包
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: 安装系统级Gradle
        run: |
          sudo apt update -y
          sudo apt install gradle -y

      - name: 自动生成并授权gradlew
        run: |
          # 找到android目录并进入
          cd android
          # 强制生成gradle wrapper
          gradle wrapper --gradle-version 4.10.3
          # 给所有相关文件加执行权限
          chmod +x gradlew gradle/wrapper/gradle-wrapper.jar
          ls -la # 打印文件列表，方便排错

      - name: 执行打包
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: Panorama360-APK
          path: android/app/build/outputs/apk/debug/*.apk
