name: Panorama360 Build APK
on:
  workflow_dispatch: # 只允许你手动点击打包，避免自动触发报错

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: 安装Gradle并生成Wrapper
        run: |
          sudo apt update && sudo apt install gradle -y
          cd android
          gradle wrapper --gradle-version 4.10.3

      - name: 给文件授权并打包
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: panorama360-apk
          path: android/app/build/outputs/apk/debug/*.apk
