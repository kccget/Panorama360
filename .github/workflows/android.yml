name: Panorama360 终极无缓存打包
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: 强制安装Gradle 4.10.3（无缓存）
        run: |
          wget https://services.gradle.org/distributions/gradle-4.10.3-bin.zip -P /tmp
          unzip -d /opt/gradle /tmp/gradle-4.10.3-bin.zip
          ln -s /opt/gradle/gradle-4.10.3 /opt/gradle/latest
          echo "GRADLE_HOME=/opt/gradle/latest" >> $GITHUB_ENV
          echo "PATH=\$GRADLE_HOME/bin:\$PATH" >> $GITHUB_ENV
          gradle --version

      - name: 进入android目录，强制生成并授权gradlew
        run: |
          cd android
          gradle wrapper --gradle-version 4.10.3
          chmod +x gradlew
          ls -la

      - name: 执行打包（无守护进程、无缓存）
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --no-build-cache --stacktrace

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: Panorama360-APK
          path: android/app/build/outputs/apk/debug/*.apk
