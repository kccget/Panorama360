name: 自动打包Panorama360 APK
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # 允许手动点击打包

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: 进入android目录并给Gradle授权
        run: |
          cd android
          chmod +x gradlew
          echo "已找到gradlew并授权完成"

      - name: 执行打包
        run: |
          cd android
          ./gradlew assembleDebug
          echo "打包完成"

      - name: 上传打包好的APK
        uses: actions/upload-artifact@v4
        with:
          name: Panorama360-APK安装包
          path: android/app/build/outputs/apk/debug/*.apk
